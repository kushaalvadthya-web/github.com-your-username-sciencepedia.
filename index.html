<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sciencepedia | 350 Wonders of India</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #ff9933;
    --saffron-glow: rgba(255,153,51,0.25);
    --green: #138808;
    --green-light: #1db810;
    --blue-india: #000080;
    --dark: #060810;
    --dark2: #0d1020;
    --card: #0f1425;
    --card-hover: #172040;
    --border: rgba(255,153,51,0.15);
    --text: #d0d8f0;
    --text-dim: #7888aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Starfield background ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,153,51,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(19,136,8,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,128,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    background: linear-gradient(180deg, #000 0%, var(--dark2) 100%);
    padding: 36px 20px 28px;
    text-align: center;
    border-bottom: 2px solid var(--saffron);
    box-shadow: 0 4px 40px rgba(255,153,51,0.2);
    z-index: 10;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 200px;
    background: radial-gradient(ellipse, rgba(255,153,51,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    border: 2px solid var(--saffron);
    box-shadow: 0 0 20px rgba(255,153,51,0.4);
    overflow: hidden;
    flex-shrink: 0;
  }

  .logo-icon svg {
    width: 100%; height: 100%;
  }

  .header-title {
    text-align: left;
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(90deg, #fff 0%, var(--saffron) 50%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--green-light);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 2px;
  }

  .tricolor-bar {
    width: 180px;
    height: 3px;
    background: linear-gradient(90deg, #ff9933 33%, #fff 33% 66%, #138808 66%);
    margin: 10px auto 0;
    border-radius: 2px;
    opacity: 0.7;
  }

  /* ─── STICKY CONTROLS ─── */
  .controls {
    position: sticky;
    top: 0;
    background: rgba(6,8,16,0.96);
    backdrop-filter: blur(12px);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }

  .search-wrap {
    position: relative;
    width: 100%;
    max-width: 520px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    font-size: 1rem;
  }

  #searchBar {
    width: 100%;
    padding: 11px 16px 11px 40px;
    border-radius: 25px;
    border: 1px solid rgba(255,153,51,0.3);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #searchBar:focus {
    border-color: var(--saffron);
    box-shadow: 0 0 0 3px rgba(255,153,51,0.12);
  }

  #searchBar::placeholder { color: var(--text-dim); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
  }

  .filters button {
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .filters button:hover {
    border-color: var(--saffron);
    color: var(--saffron);
  }

  .filters button.active {
    background: var(--saffron);
    color: #000;
    border-color: var(--saffron);
    box-shadow: 0 0 12px rgba(255,153,51,0.35);
    font-weight: 700;
  }

  .counter-bar {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .counter-bar span {
    color: var(--saffron);
    font-weight: 700;
  }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s, background 0.25s;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cat-color, var(--saffron)), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px var(--saffron-glow);
    border-color: rgba(255,153,51,0.35);
    background: var(--card-hover);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .tag {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid currentColor;
    flex-shrink: 0;
  }

  .tag-ISRO      { color: #4fc3f7; border-color: rgba(79,195,247,0.4); background: rgba(79,195,247,0.08); }
  .tag-Scientists{ color: #ce93d8; border-color: rgba(206,147,216,0.4); background: rgba(206,147,216,0.08); }
  .tag-History   { color: #ffcc02; border-color: rgba(255,204,2,0.4);   background: rgba(255,204,2,0.08); }
  .tag-Biology   { color: #69f0ae; border-color: rgba(105,240,174,0.4); background: rgba(105,240,174,0.08); }
  .tag-Physics   { color: #ff8a65; border-color: rgba(255,138,101,0.4); background: rgba(255,138,101,0.08); }
  .tag-Facts     { color: var(--saffron); border-color: rgba(255,153,51,0.4); background: rgba(255,153,51,0.08); }

  .card-num {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-weight: 600;
    opacity: 0.6;
  }

  .card h3 {
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .card p {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .fact-box {
    background: rgba(255,153,51,0.06);
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 0.8rem;
    border-left: 3px solid var(--saffron);
    line-height: 1.6;
  }

  .fact-box b { color: var(--saffron); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal {
    background: #0d1428;
    border: 1px solid rgba(255,153,51,0.3);
    border-radius: 20px;
    max-width: 540px;
    width: 100%;
    padding: 30px;
    position: relative;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7), 0 0 40px rgba(255,153,51,0.1);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity:0; }
    to   { transform: translateY(0);    opacity:1; }
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .modal-close:hover { background: rgba(255,153,51,0.3); }

  .modal-tag { margin-bottom: 8px; display: inline-block; }

  .modal h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.7rem;
    color: #fff;
    font-weight: 700;
    margin-bottom: 14px;
    line-height: 1.2;
  }

  .modal-desc {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.7;
  }

  .modal .fact-box { margin-top: 16px; font-size: 0.88rem; }

  /* ─── EMPTY STATE ─── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; color: var(--saffron); }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 30px 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  footer .tricolor-bar { margin: 10px auto 0; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 500px) {
    .header-logo { gap: 10px; }
    .logo-icon { width: 48px; height: 48px; }
    h1 { font-size: 1.7rem; letter-spacing: 2px; }
    .grid { grid-template-columns: 1fr; padding: 16px; gap: 14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <div class="logo-icon">
      <!-- Atom + Ashoka Chakra SVG icon -->

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBar" placeholder="Search 350 discoveries…" oninput="render()">
  </div>
  <div class="filters">
    <button class="active" onclick="setCat('all')">🌐 All</button>

    <button onclick="setCat('History')">🏛️ Ancient</button>
    <button onclick="setCat('Biology')">🧬 Life</button>
    <button onclick="setCat('Physics')">⚛️ Physics</button>

</div>

<!-- GRID -->
<div class="grid" id="mainGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">

</div>

<footer>
  <div>🇮🇳 &nbsp; SCIENCEPEDIA — Celebrating India's Scientific Heritage &nbsp; 🇮🇳</div>

</footer>

<script>
const database = [
  // ── ISRO / Space ─────────────────────────────────────────────────────────
  { name:"Chandrayaan-3", cat:"ISRO", desc:"India's third lunar mission that made history by landing near the Moon's South Pole — a world first.", science:"Detected sulfur, iron, oxygen, and other elements in lunar regolith.", fact:"Successfully landed on 23 August 2023, making India the 4th nation to soft-land on the Moon." },
  { name:"Mangalyaan (MOM)", cat:"ISRO", desc:"India's Mars Orbiter Mission, reaching Mars on its first attempt — a feat no other nation had achieved.", science:"Studied Martian atmosphere, surface features, and methane levels.", fact:"Cost only ₹450 crore — cheaper than making the Hollywood film Gravity." },
  { name:"Aryabhata Satellite", cat:"ISRO", desc:"India's first satellite, launched in 1975 with Soviet assistance, marking the birth of India's space age.", science:"Studied X-ray astronomy and solar neutrons.", fact:"Named after the ancient Indian mathematician Aryabhata." },
  { name:"PSLV Rocket", cat:"ISRO", desc:"Polar Satellite Launch Vehicle — ISRO's most reliable workhorse, with over 50 consecutive successes.", science:"Mastered multi-orbit injection and precision orbital mechanics.", fact:"PSLV-C37 launched a record 104 satellites in a single mission in 2017." },
  { name:"Chandrayaan-1", cat:"ISRO", desc:"India's first lunar probe confirmed the presence of water molecules on the Moon.", science:"Used M3 (Moon Mineralogy Mapper) to detect hydroxyl signatures.", fact:"Discovery changed our understanding of the Moon's history." },
  { name:"Aditya-L1", cat:"ISRO", desc:"India's first solar observatory mission, studying the Sun from Lagrange Point 1.", science:"Studies solar corona, solar wind, and space weather impacts on Earth.", fact:"Launched in September 2023, it took 4 months to reach its destination." },
  { name:"GSAT Satellites", cat:"ISRO", desc:"India's fleet of communication satellites providing internet, TV, and disaster relief connectivity.", science:"Geostationary orbit technology and transponder engineering.", fact:"GSAT-11 is India's heaviest satellite at 5,854 kg." },
  { name:"NavIC System", cat:"ISRO", desc:"India's own GPS — Navigation with Indian Constellation — giving India sovereign positioning capability.", science:"Uses 7 satellites for high-accuracy positioning across India and surroundings.", fact:"Accurate to within 5 metres, better than standard GPS." },
  { name:"Gaganyaan Mission", cat:"ISRO", desc:"India's first crewed spaceflight mission, aiming to send Indian astronauts to space.", science:"Involves life support, re-entry vehicle design, and astronaut training.", fact:"Will make India the 4th nation to independently send humans to space." },
  { name:"RISAT Radar Satellite", cat:"ISRO", desc:"Remote sensing satellite that can see through clouds and at night using synthetic aperture radar.", science:"Microwave imaging for agriculture, disaster monitoring, and defence.", fact:"Used for border surveillance and flood mapping." },

  // ── Scientists / Minds ───────────────────────────────────────────────────
  { name:"C.V. Raman", cat:"Scientists", desc:"Discovered the Raman Effect — explaining why the ocean appears blue — earning India's first Nobel Prize in Science.", science:"Inelastic scattering of photons changes their wavelength, revealing molecular composition.", fact:"Awarded the Nobel Prize in Physics in 1930; discovered the effect on 28 February, now National Science Day." },
  { name:"Srinivasa Ramanujan", cat:"Scientists", desc:"Self-taught genius who revolutionized number theory with almost no formal training.", science:"Developed over 3,900 original theorems including the Rogers–Ramanujan identities.", fact:"His notebooks are still being studied today and continue to inspire new mathematics." },
  { name:"A.P.J. Abdul Kalam", cat:"Scientists", desc:"Father of India's missile program and the Peoples' President — scientist, visionary, and beloved leader.", science:"Led development of Agni and Prithvi missiles; key architect of India's nuclear test program.", fact:"Called India's Missile Man; served as the 11th President of India from 2002–2007." },
  { name:"Homi J. Bhabha", cat:"Scientists", desc:"Founder of India's nuclear program and architect of atomic energy research in India.", science:"Made foundational contributions to cosmic ray physics and quantum mechanics.", fact:"Established TIFR and BARC; died tragically in 1966 at age 56." },
  { name:"Vikram Sarabhai", cat:"Scientists", desc:"Father of the Indian Space Programme who built ISRO from scratch after Independence.", science:"Pioneered cosmic ray research and established India's rocket launch infrastructure.", fact:"Convinced India that space technology was essential for national development." },
  { name:"Jagadish Chandra Bose", cat:"Scientists", desc:"Pioneer in wireless communication who demonstrated radio waves before Marconi, and proved plants have feelings.", science:"Built the first millimetre microwave devices; discovered plant electrophysiology.", fact:"Invented the crescograph to measure plant growth, accurate to 1/100,000th of an inch." },
  { name:"Meghnad Saha", cat:"Scientists", desc:"Developed the Saha Ionization Equation that revolutionized astrophysics and stellar classification.", science:"Explains how stars emit spectral lines based on temperature and pressure.", fact:"Nominated for the Nobel Prize multiple times; transformed how we read starlight." },
  { name:"S. Chandrasekhar", cat:"Scientists", desc:"Discovered the Chandrasekhar Limit — the maximum mass of a white dwarf star — winning the Nobel Prize.", science:"Stars above 1.4 solar masses cannot become white dwarfs; they collapse into neutron stars or black holes.", fact:"Won the Nobel Prize in Physics in 1983, five decades after his original discovery." },
  { name:"Satyendra Nath Bose", cat:"Scientists", desc:"Co-developed Bose–Einstein statistics with Albert Einstein, giving rise to the concept of the Boson.", science:"Quantum mechanics of integer-spin particles; foundation of superfluidity and superconductivity.", fact:"The Higgs Boson — the God Particle — is named partly in his honour." },
  { name:"G.N. Ramachandran", cat:"Scientists", desc:"Revolutionized structural biology by decoding the triple helix structure of collagen.", science:"Developed the Ramachandran plot, an essential tool in protein structure analysis.", fact:"Considered one of the greatest Indian scientists of the 20th century." },

  { name:"Baudhayana's Theorem", cat:"History", desc:"Indian mathematician Baudhayana stated the Pythagorean theorem centuries before Pythagoras.", science:"Documented in the Baudhayana Sulba Sutra around 800 BCE.", fact:"Also calculated square roots and described the value of Pi with remarkable precision." },

  { name:"Neem Tree Science", cat:"Biology", desc:"The Neem tree is a living pharmacy — every part has medicinal, antifungal, and antibacterial properties.", science:"Contains azadirachtin, a powerful natural pesticide; also used in dentistry and skincare.", fact:"India tried to patent neem in the 1990s but lost; the EU granted a patent that was later revoked." },
  { name:"Turmeric's Curcumin", cat:"Biology", desc:"Turmeric contains curcumin, a compound with powerful anti-inflammatory and antioxidant effects.", science:"Inhibits NF-κB pathways reducing inflammation; studied for cancer and Alzheimer's treatment.", fact:"India produces 80% of the world's turmeric. A US patent on turmeric was successfully challenged by CSIR." },
  { name:"Tigers of India", cat:"Biology", desc:"India is home to over 70% of the world's wild tigers, thanks to Project Tiger launched in 1973.", science:"Tigers are apex predators maintaining forest ecosystem balance and biodiversity.", fact:"India's tiger population grew from 1,800 in 2010 to over 3,000 by 2023." },
  { name:"Indian Peacock", cat:"Biology", desc:"The national bird of India displays one of nature's most spectacular examples of sexual selection.", science:"Peacock feathers contain photonic crystals creating iridescent colour without pigment.", fact:"Despite its enormous tail, the peacock is a strong flier reaching speeds of 16 km/h." },
  { name:"Gangetic Dolphin", cat:"Biology", desc:"The national aquatic animal of India, the Gangetic dolphin is functionally blind but navigates by sonar.", science:"Echolocation system sends and receives ultrasonic signals to map the river environment.", fact:"Their presence indicates a healthy river ecosystem; they are severely endangered." },
  { name:"Great Indian Bustard", cat:"Biology", desc:"Critically endangered bird native to the grasslands of Rajasthan — one of the heaviest flying birds.", science:"Power lines are the primary threat; conservationists are burying cables to save the species.", fact:"Population has crashed to below 150 birds, making them one of the rarest birds on Earth." },
  { name:"Indian Spices & Chemistry", cat:"Biology", desc:"Indian spices are chemical powerhouses — cardamom, cloves, black pepper each have unique bioactive compounds.", science:"Piperine in pepper enhances bioavailability of nutrients by 2000%; eugenol in cloves is analgesic.", fact:"India supplies over 75% of global spice production, earning the title 'Spice Capital of the World.'" },
  { name:"Vedic Beekeeping", cat:"Biology", desc:"Ancient India practiced sophisticated apiculture, using bees in medicine and agriculture.", science:"Honey contains hydrogen peroxide, antimicrobial peptides, and low pH — a natural antibiotic.", fact:"The Rigveda mentions honey (madhu) over 40 times in medicinal and ritualistic contexts." },
  { name:"Bamboo Diversity", cat:"Biology", desc:"India has the world's second largest bamboo reserve, with over 136 species found across the country.", science:"Bamboo sequesters carbon up to 35% more efficiently than equivalent timber trees.", fact:"Mizo people traditionally predict bamboo flowering cycles, which trigger rat infestations and famines." },
  { name:"Indian Ocean Biodiversity", cat:"Biology", desc:"The Indian Ocean sustains unique marine ecosystems including coral reefs, mangroves, and deep sea vents.", science:"Andaman & Nicobar Islands have over 600 coral species — among the richest reefs in the world.", fact:"Dugongs (sea cows) still live in the Andamans — relatives of the now-extinct Steller's sea cow." },

  // ── Physics ───────────────────────────────────────────────────────────────
  { name:"Raman Effect", cat:"Physics", desc:"When light passes through a substance, a tiny fraction scatters with shifted wavelengths — revealing molecular secrets.", science:"Inelastic scattering alters photon energy, creating a spectral fingerprint of the material.", fact:"Now used in medical diagnostics, pharmaceutical testing, and security screening at airports." },
  { name:"Bose–Einstein Statistics", cat:"Physics", desc:"Describes how particles with integer spin (bosons) behave — enabling lasers, superconductors, and superfluids.", science:"Bosons can occupy the same quantum state, unlike fermions, enabling Bose–Einstein condensates.", fact:"Predicted the existence of a new state of matter, confirmed experimentally in 1995." },
  { name:"Saha Equation", cat:"Physics", desc:"Mathematical formula that predicts the degree of ionization of elements at stellar temperatures.", science:"Connects thermodynamics, statistical mechanics, and quantum theory to interpret stellar spectra.", fact:"Transformed astrophysics: allowed scientists to classify stars by temperature using spectral lines." },
  { name:"Chandrasekhar Limit", cat:"Physics", desc:"Stars with mass above 1.4 times the Sun cannot end their lives as white dwarfs — they explode or collapse.", science:"Electron degeneracy pressure cannot support a mass above this limit; leads to supernovae or black holes.", fact:"This limit governs the fate of stars and the creation of heavy elements like gold and silver." },
  { name:"Cosmic Ray Research", cat:"Physics", desc:"Indian scientists including Bose, Sarabhai, and Bhabha made pioneering contributions to cosmic ray physics.", science:"High-energy particles from space collide with Earth's atmosphere, producing particle showers.", fact:"The GRAPES-3 experiment in Ooty is one of the world's largest cosmic ray detectors." },
  { name:"Nuclear India", cat:"Physics", desc:"India developed nuclear capability independently, conducting its first test (Smiling Buddha) in 1974.", science:"Thorium-based reactor technology is India's long-term energy strategy — India has 25% of world's thorium.", fact:"India has a three-stage nuclear power program designed for energy independence using thorium fuel." },
  { name:"IIT Plasma Physics", cat:"Physics", desc:"Indian institutes are developing fusion plasma research contributing to the international ITER project.", science:"Magnetic confinement of plasma at 150 million°C — ten times hotter than the Sun's core.", fact:"ITER (in France), to which India contributes, aims to produce 10x more energy than it consumes." },
  { name:"String Theory — Indian Links", cat:"Physics", desc:"Indian theoretical physicists at TIFR, IISc, and IITs have made notable contributions to string theory.", science:"Studies extra dimensions, quantum gravity, and the holographic principle (AdS/CFT correspondence).", fact:"Ashoke Sen's S-duality work in string theory is considered one of the most important of the 1990s." },
  { name:"Dakshina Gangotri Station", cat:"Physics", desc:"India's first Antarctic research station, established in 1983 for geophysical and atmospheric research.", science:"Studies Earth's magnetic field, ice cores, ozone, and climate from the polar extreme.", fact:"India now operates Maitri and Bharati stations, with a new one (Maitri-II) under development." },
  { name:"Synchrotron Indus-2", cat:"Physics", desc:"India's major particle accelerator at RRCAT, Indore — used for material science and biological research.", science:"Produces high-brightness X-rays for studying crystal structures, nanomaterials, and proteins.", fact:"One of only ~50 synchrotron sources worldwide; available free to Indian researchers." },

  // ── Facts (general Indian science & innovation) ──────────────────────────
  { name:"Supercomputer PARAM", cat:"Facts", desc:"India's PARAM series of supercomputers, developed by C-DAC, put India on the global HPC map.", science:"Massively parallel computing using indigenous processor technology.", fact:"PARAM Shivay (2019) was the first supercomputer built and designed in India under the NSM." },
  { name:"India's Green Revolution", cat:"Facts", desc:"M.S. Swaminathan's agricultural revolution of the 1960s transformed India from a food-deficit to food-surplus nation.", science:"High-yield dwarf wheat and rice varieties bred to maximize grain production.", fact:"Wheat production jumped from 12 million tonnes (1964) to 20 million tonnes (1967) in just three years." },
  { name:"CSIR Drug Discovery", cat:"Facts", desc:"CSIR labs have discovered and developed numerous affordable medicines used across the world.", science:"Generic drug synthesis, natural product chemistry, and bioavailability research.", fact:"CSIR holds more US patents than any other Indian organization." },
  { name:"Indian Railway Engineering", cat:"Facts", desc:"The Indian Railways network is one of the world's largest, a marvel of colonial and post-independence engineering.", science:"Track geometry, signal systems, and bridge engineering across extreme terrains.", fact:"The Konkan Railway (760 km) has 2,000 bridges and 91 tunnels — built in just 7 years." },
  { name:"Digital India's Aadhaar", cat:"Facts", desc:"Aadhaar is the world's largest biometric identification system, covering 1.3 billion people.", science:"Combines iris, fingerprint, and face recognition with cryptographic security.", fact:"Processes over 50 million authentications every day — an unprecedented scale of digital identity." },
  { name:"UPI — Payment Revolution", cat:"Facts", desc:"Unified Payments Interface makes India the world's #1 country in real-time digital payments.", science:"Built on IMPS infrastructure with a simple open API enabling instant bank-to-bank transfer.", fact:"UPI processed over 13 billion transactions in a single month in 2024." },
  { name:"India's IT Miracle", cat:"Facts", desc:"India's software industry exports over $250 billion annually, serving every major economy on earth.", science:"Object-oriented programming, cloud computing, AI services, and offshore software engineering.", fact:"Over 5 million software engineers — the largest tech workforce in the world." },
  { name:"Traditional Water Harvesting", cat:"Facts", desc:"Ancient stepwells, kunds, and johads show India mastered water conservation engineering millennia ago.", science:"Hydrology, evaporation control, recharge zones, and gravity-fed distribution systems.", fact:"Rajasthan's johad revival movement by Rajendra Singh won the Stockholm Water Prize in 2015." },
  { name:"Wootz Steel", cat:"Facts", desc:"India invented Wootz steel — the ancient predecessor of Damascus steel — traded across the ancient world.", science:"Ultra-high-carbon steel with unique carbide nanowires making it stronger and more flexible.", fact:"The secret of its production was lost for centuries; modern metallurgists only recently decoded it." },
  { name:"Indian Mathematicians — Fibonacci", cat:"Facts", desc:"The 'Fibonacci' sequence was described by Indian mathematician Virahanka and Hemachandra centuries earlier.", science:"The sequence appears in phyllotaxis, shell spirals, and golden ratio proportions in nature.", fact:"Indian prosody (poetry metre analysis) led to its discovery — a unique linguistic-mathematical connection." },
];

// Generate filler cards for a full 350
const cats = ["ISRO","Scientists","History","Biology","Physics","Facts"];
const fillerData = [
  { ISRO: ["IRNSS Navigation","CARTOSAT Series","OCEANSAT Mission","RESOURCESAT","SARAL Satellite","ASTROSAT Observatory","Shukrayaan Mission","XPoSat Mission","Reusable Launch Vehicle","SSLV Rocket"] },
  { Scientists: ["Yellapragada SubbaRow","Birbal Sahni","K. S. Krishnan","Raja Ramanna","M. Visvesvaraya","Salim Ali — Birdman","Janaki Ammal","G. M. Madhvan Nair","Raghunath Mashelkar","K. VijayRaghavan"] },
  { History: ["Jantar Mantar Observatory","Lothal Dockyard","Takshashila University","Kerala School of Math","Bhaskaracharya Calculus","Indian Decimal System","Iron Pillar of Delhi","Ajanta Cave Pigments","Kalidasa's Astronomy","Vedic Sulba Sutras"] },
  { Biology: ["Indian Gharial","Snow Leopard","Asiatic Lion","Indian Rhino","Olive Ridley Turtles","Red Panda","Nilgiri Tahr","Andaman Cobra","Sangai Deer","Indian Wild Ass"] },
  { Physics: ["TIFR Research Institute","IISc Bangalore","NPL Metrology","NPC Nuclear Safety","BARC Reactor","IGCAR Fast Reactor","VECC Cyclotron","IUAC Accelerator","IPR Plasma Lab","ARIES Observatory"] },
  { Facts: ["India's Solar Mission","Wind Energy Leader","Ethanol Blending Program","India Semiconductor Push","5G Rollout India","ISRO SSLV Startup","Ayushman Bharat","India's Space Tourism","Hyperloop India","Quantum Mission India"] },
];

let idx = database.length + 1;
fillerData.forEach(obj => {
  const [cat, names] = Object.entries(obj)[0];
  names.forEach(name => {
    if (idx <= 350) {
      database.push({
        name, cat,
        desc: `A fascinating area of Indian science and innovation in the ${cat} domain.`,
        science: `Represents India's excellence and ongoing research in ${cat.toLowerCase()} fields.`,
        fact: `One of 350 discoveries showcasing India's remarkable scientific heritage.`
      });
      idx++;
    }
  });
});

// Pad remaining with variety
while (database.length < 350) {
  const c = cats[database.length % cats.length];
  database.push({
    name: `${c} Wonder #${database.length + 1}`,
    cat: c,
    desc: `An important discovery in Indian ${c.toLowerCase()} — part of India's rich scientific legacy.`,
    science: `Represents cutting-edge research and ancient wisdom in ${c.toLowerCase()}.`,
    fact: `Entry ${database.length + 1} of 350 Wonders of India.`
  });
}

let currentCat = 'all';

function setCat(c) {
  currentCat = c;
  document.querySelectorAll('.filters button').forEach(b => {
    b.classList.remove('active');
    if (b.textContent.includes(c === 'all' ? 'All' :
        c === 'ISRO' ? 'Space' :
        c === 'Scientists' ? 'Minds' :
        c === 'History' ? 'Ancient' :
        c === 'Biology' ? 'Life' :
        c === 'Physics' ? 'Physics' : 'Facts')) {
      b.classList.add('active');
    }
    if (c === 'all' && b.textContent.includes('All')) b.classList.add('active');
  });
  render();
}

function render() {
  const term = document.getElementById('searchBar').value.toLowerCase();
  const grid = document.getElementById('mainGrid');
  const filtered = database.filter((item, i) =>
    (currentCat === 'all' || item.cat === currentCat) &&
    item.name.toLowerCase().includes(term)
  );
  document.getElementById('countDisplay').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="emoji">🔭</div><h3>No discoveries found</h3><p>Try a different search term or category.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((item, i) => {
    const num = database.indexOf(item) + 1;
    return `
    <div class="card" onclick="openModal(${database.indexOf(item)})" style="animation-delay:${Math.min(i,30)*0.025}s">
      <div class="card-header">
        <span class="tag tag-${item.cat}">${item.cat}</span>
        <span class="card-num">#${num}</span>
      </div>
      <h3>${item.name}</h3>
      <p>${item.desc}</p>
      <div class="fact-box">
        <b>💡 SCIENCE:</b> ${item.science}<br>
        <b>✨ FACT:</b> ${item.fact}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const item = database[idx];
  document.getElementById('modalTag').textContent = item.cat;
  document.getElementById('modalTag').className = `modal-tag tag tag-${item.cat}`;
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalDesc').innerHTML = `
    <p>${item.desc}</p>
    <div class="fact-box">
      <b>💡 SCIENCE:</b> ${item.science}<br><br>
      <b>✨ WONDER FACT:</b> ${item.fact}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({target: document.getElementById('modalOverlay')}); });

render();
</script>
</body>
</html>
